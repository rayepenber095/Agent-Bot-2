kind = "web"
previewPath = "/"
title = "VulnLab Pro"
version = "1.0.0"
id = "artifacts/vulnlab-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24452

[services.development]
run = "pnpm --filter @workspace/vulnlab-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vulnlab-pro", "run", "build" ]
publicDir = "artifacts/vulnlab-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24452"
BASE_PATH = "/"
